# ─── status.franquiabv.xyz ────────────────────────────────────────────────────
# Arquivo: /etc/nginx/sites-available/daily-briefing
# Habilitar: ln -s /etc/nginx/sites-available/daily-briefing /etc/nginx/sites-enabled/
#
# IMPORTANTE: este arquivo é HTTP-only intencionalmente.
# O Certbot adiciona o bloco SSL automaticamente ao rodar:
#   certbot --nginx -d status.franquiabv.xyz
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name status.franquiabv.xyz;

    # ── Servir HTML estático gerado pelo briefing ─────────────────────────────
    root  /opt/barbearia-daily/output;
    index index.html;

    # Arquivos HTML dos briefings — sem cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets estáticos (css, js, imagens embutidas no template)
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
    }

    # Auto-index desabilitado por segurança
    autoindex off;

    # Fallback: listing de briefings disponíveis quando não há index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Bloqueia acesso a arquivos de configuração
    location ~ /\.(env|git|log) {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/daily-briefing.access.log;
    error_log  /var/log/nginx/daily-briefing.error.log;
}
