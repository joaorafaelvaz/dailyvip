# ─── status.franquiabv.xyz ────────────────────────────────────────────────────
# Arquivo: /etc/nginx/sites-available/daily-briefing
# Habilitar: ln -s /etc/nginx/sites-available/daily-briefing /etc/nginx/sites-enabled/
#
# Após habilitar, rodar:
#   certbot --nginx -d status.franquiabv.xyz
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name status.franquiabv.xyz;

    # Redireciona todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name status.franquiabv.xyz;

    # Certificados gerenciados pelo Certbot (preenchidos automaticamente)
    ssl_certificate     /etc/letsencrypt/live/status.franquiabv.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.franquiabv.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Segurança ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Servir HTML estático gerado pelo briefing ─────────────────────────────
    root  /opt/barbearia-daily/output;
    index index.html;

    # Redireciona / para o briefing do dia atual
    location = / {
        set $today /briefing-$date_gmt;   # variável auxiliar
        # Usa um try_files para o HTML do dia — se não existir, lista o diretório
        try_files /briefing-$time_iso8601.html /index.html @autoindex;
    }

    # Arquivos HTML dos briefings
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets estáticos (css, js, imagens embutidas no template)
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
    }

    # Auto-index desabilitado por segurança
    autoindex off;

    # Fallback: listing de briefings disponíveis quando não há index.html
    location @autoindex {
        autoindex     on;
        autoindex_format html;
    }

    # Bloqueia acesso a arquivos de configuração
    location ~ /\.(env|git|log) {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/daily-briefing.access.log;
    error_log  /var/log/nginx/daily-briefing.error.log;
}
